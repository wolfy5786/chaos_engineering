apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: dummy-test
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: dummy-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
      app.kubernetes.io/part-of: dummy-test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: dummy-test
    spec:
      containers:
        - name: gateway
          image: dummy-test/gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: SVC_A_URL
              value: "http://svc-a:8000"
            - name: AUTH_SERVICE_URL
              value: "http://auth:8000"
            - name: DEBUG_AGENT_LOG
              value: "/tmp/debug-7388ce.log"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
