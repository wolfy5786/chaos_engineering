name: skeleton-smoke
duration_seconds: 0

# ---------------------------------------------------------------------------
# Workload generator configuration (optional)
# Remove or adjust for your target system.
# ---------------------------------------------------------------------------
#
# workload:
#   type: realistic_client
#
#   # Target throughput in requests per second across all workers.
#   rps: 10
#
#   # Number of worker threads (optional).
#   # Defaults to min(rps, 20).  Each worker fires at (num_workers / rps) req/s.
#   # num_workers: 5
#
#   # How long to wait for a single HTTP request before timing out (seconds).
#   # request_timeout_seconds: 10
#
#   # How long to wait for workers to finish when stop() is called (seconds).
#   # stop_timeout_seconds: 10
#
#   # Optional: increase concurrency during the fault-injection phase.
#   # fault_rps: 20
#
#   # Target service URLs.
#   # base_url can also be set via the WORKLOAD_BASE_URL environment variable.
#   targets:
#     base_url: "http://localhost:8000"
#     endpoints:
#       # Short form (no body).
#       browse_profile: "GET  /users/1/profile"
#       access_data:    "GET  /data"
#       # Full form — supply a JSON body and optional headers/params.
#       # ${VAR} / ${VAR:default} are substituted from the process environment.
#       login:
#         method: POST
#         path: /auth/login
#         body:
#           email: "${LOGIN_EMAIL}"
#           password: "${LOGIN_PASSWORD}"
#         # headers:
#         #   X-Test-Run: "chaos-smoke"
#         # params:
#         #   debug: "1"
#
#   # Operations to cycle through. Workers keep hitting every op for the
#   # entire run; failures do not remove an endpoint from rotation.
#   operations:
#     - login
#     - browse_profile
#     - access_data
#
#   # Endpoint selection strategy: random (default) or round_robin.
#   # selection: round_robin
#
#   # Optional static headers sent with every request.
#   # headers:
#   #   X-Test-Run: "chaos-smoke"
