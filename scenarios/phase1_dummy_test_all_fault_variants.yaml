# Phase 1 chaos scenario — dummy_test stack with all implemented fault variants.
#
# Included fault variants (Phase 1):
#   - pod_kill
#   - pod_pause
#   - single_pod_kill
#   - multi_pod_kill
#   - multi_service_pod_kill
#
# Run:
#   python -m framework.fault_injector inject --spec scenarios/phase1_dummy_test_all_fault_variants.yaml
#
# Or run full pipeline:
#   python -m framework.cli run --scenario scenarios/phase1_dummy_test_all_fault_variants.yaml

name: phase1_dummy_test_all_fault_variants
description: >
  Phase 1 end-to-end scenario for dummy_test that exercises every implemented
  compute fault variant in a single run, from targeted to namespace-wide pod disruption.

workload:
  type: realistic_client
  rps: 5
  # Workers keep hitting every operation for the entire run; failures are
  # counted (see workload_generator metrics log) but never drop an op from
  # the rotation. Use selection=round_robin for deterministic coverage.
  selection: random
  targets:
    base_url: "http://localhost:8000"
    endpoints:
      health: "GET /health"
      chain: "GET /chain"
      # /auth/login requires a JSON body {email,password}. Credentials are
      # read from the process environment (populate LOGIN_EMAIL / LOGIN_PASSWORD
      # in .env — the signup step below creates them if they don't exist yet).
      login:
        method: POST
        path: /auth/login
        body:
          email: "${LOGIN_EMAIL}"
          password: "${LOGIN_PASSWORD}"
  operations:
    - health
    - chain
    - login

faults:
  # 1) Kill all pods for one service.
  - type: pod_kill
    target:
      namespace: dummy-test
      label_selector: app.kubernetes.io/component=auth
    delay_seconds: 0

  # 2) Pause one service process (revert uses SIGCONT).
  - type: single_pod_kill
    target:
      namespace: dummy-test
      label_selector: app.kubernetes.io/component=svc-a
    delay_seconds: 5

  # 3) Kill exactly one random matching pod.
  - type: single_pod_kill
    target:
      namespace: dummy-test
      label_selector: app.kubernetes.io/component=svc-b
    delay_seconds: 10

  # 4) Kill up to count random pods from one service.
  - type: multi_pod_kill
    target:
      namespace: dummy-test
      label_selector: app.kubernetes.io/component=svc-a
    count: 2
    delay_seconds: 15

  # 5) Kill pods from an explicit list of service selectors.
  - type: multi_service_pod_kill
    target:
      namespace: dummy-test
      label_selector: ""
    targets:
      - app.kubernetes.io/component=auth
      - app.kubernetes.io/component=svc-a
      - app.kubernetes.io/component=svc-b
    delay_seconds: 20
