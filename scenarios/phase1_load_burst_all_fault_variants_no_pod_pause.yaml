# Phase 1 — burst traffic + all non-pause pod fault variants (dummy_test stack)
#
# Merges the burst-load profile from phase1_load_burst_and_fault with the
# broader fault coverage from phase1_dummy_test_all_fault_variants, while
# intentionally excluding any pod_pause fault.
#
# Run:
#   python -m framework.cli run --scenario scenarios/phase1_load_burst_all_fault_variants_no_pod_pause.yaml
#
name: phase1_load_burst_all_fault_variants_no_pod_pause
description: >
  Stress-style traffic with burst_pattern and higher fault-phase RPS while
  exercising every implemented non-pause pod fault variant for the dummy_test
  stack in a single Phase 1 run.

phases:
  baseline_duration_seconds: 4
  injection_duration_seconds: 26

workload:
  type: realistic_client
  rps: 8
  fault_rps: 20
  burst_pattern:
    enabled: true
    normal_rps: 8
    burst_rps: 35
    burst_duration_seconds: 2
    cooldown_seconds: 4
    cycles: null
  targets:
    base_url: "http://localhost:8000"
    endpoints:
      health: "GET /health"
      chain: "GET /chain"
      # /auth/login requires a JSON body {email,password}. Credentials are
      # read from the process environment (populate LOGIN_EMAIL / LOGIN_PASSWORD
      # in .env). The short form "POST /auth/login" sends no body and will
      # return 422 from the auth service — always use the full form below.
      login:
        method: POST
        path: /auth/login
        body:
          email: "${LOGIN_EMAIL}"
          password: "${LOGIN_PASSWORD}"
  operations:
    - health
    - chain
    - login

faults:
  # Retained from phase1_load_burst_and_fault.
  - type: pod_kill
    target:
      namespace: dummy-test
      label_selector: app.kubernetes.io/component=svc-b
    delay_seconds: 0

  # Retained from phase1_dummy_test_all_fault_variants.
  - type: pod_kill
    target:
      namespace: dummy-test
      label_selector: app.kubernetes.io/component=auth
    delay_seconds: 0

  - type: single_pod_kill
    target:
      namespace: dummy-test
      label_selector: app.kubernetes.io/component=svc-a
    delay_seconds: 5

  # Retained from phase1_load_burst_and_fault (same selector as above, different fault type).
  - type: pod_kill
    target:
      namespace: dummy-test
      label_selector: app.kubernetes.io/component=auth
    delay_seconds: 10

  - type: single_pod_kill
    target:
      namespace: dummy-test
      label_selector: app.kubernetes.io/component=svc-b
    delay_seconds: 10

  - type: multi_pod_kill
    target:
      namespace: dummy-test
      label_selector: app.kubernetes.io/component=svc-a
    count: 2
    delay_seconds: 15

# During chaos, many requests may fail; thresholds are sanity checks only — tune as needed.
assertions:
  load:
    min_requests_total: 50
    min_success_rate_pct: 5.0
    max_failed_requests: 100000
    max_latency_mean_ms: 120000.0
